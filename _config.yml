title: Arai Notes
description: A personal daily blog for self-improvement, cybersecurity, finance, workout, language learning, media management, and Islam.
url: "https://araisantai.github.io"
baseurl: ""
lang: en
timezone: Asia/Bangkok

author:
  name: Arai

contact:
  email: araisantai@users.noreply.github.com

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

sass:
  style: compressed
  sourcemap: never

plugins:
  - jekyll-feed
  - jekyll-sitemap

blog_categories:
  - slug: personal-development
    title: Personal
    nav_label: Personal
    emoji: "Personal"
    color: "#22c55e"
    nav_color: "#16a34a"
    description: Daily systems, habits, reflection, discipline, and steady personal growth.
  - slug: cybersecurity
    title: Cybersecurity
    nav_label: Cybersecurity
    emoji: "Security"
    color: "#38bdf8"
    nav_color: "#0284c7"
    description: Ethical, defensive security notes for safer systems, habits, and workflows.
  - slug: finance
    title: Finance
    nav_label: Finance
    emoji: "Finance"
    color: "#f59e0b"
    nav_color: "#d97706"
    description: Personal finance learning, money habits, journaling, and long-term thinking.
  - slug: learning-languages
    title: Languages
    nav_label: Languages
    emoji: "Languages"
    color: "#14b8a6"
    nav_color: "#0d9488"
    description: Study methods, vocabulary systems, input practice, and language reflections.
  - slug: workout
    title: Workout
    nav_label: Workout
    emoji: "Workout"
    color: "#ef4444"
    nav_color: "#dc2626"
    description: Strength, mobility, recovery, and sustainable fitness routines.
  - slug: media-management
    title: Media
    nav_label: Media
    emoji: "Media"
    color: "#ec4899"
    nav_color: "#db2777"
    description: Organizing photos, videos, files, archives, and personal knowledge libraries.
  - slug: islam
    title: Islam
    nav_label: Islam
    emoji: "Islam"
    color: "#10b981"
    nav_color: "#059669"
    description: Respectful reflections, learning notes, source tracking, and personal practice.

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Arai
  - scope:
      path: "categories"
    values:
      layout: category

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
