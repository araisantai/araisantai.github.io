<a class="skip-link" href="#main-content">Skip to content</a>

<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title | escape }} home">
      <span>{{ site.title }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <details class="nav-dropdown">
        <summary class="site-nav__link nav-dropdown__summary">Categories</summary>
        <div class="nav-dropdown__menu">
          {% for category in site.blog_categories %}
            <a href="{{ '/categories/' | append: category.slug | append: '/' | relative_url }}">{{ category.nav_label | default: category.title }}</a>
          {% endfor %}
        </div>
      </details>
      <a class="site-nav__link" href="{{ '/' | relative_url }}#latest">Latest Post</a>
      <a class="site-nav__link" href="{{ '/' | relative_url }}#contact">About Me</a>
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">&#9728;</span>
      <span class="theme-toggle__knob" aria-hidden="true"></span>
      <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">&#9790;</span>
    </button>
  </div>
</header>
